name: Deploy Dr. Juice to GitHub Pages

# Publishes the self-contained drjuice-standalone.html as the repo's
# GitHub Pages site, so it's viewable at a public URL.
on:
  push:
    branches:
      - claude/dr-juice-marketing-analysis-db1mgp
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          # Serve Dr. Juice at the site root for a clean URL...
          cp drjuice-standalone.html _site/index.html
          # ...and also keep it reachable by its original filename.
          cp drjuice-standalone.html _site/drjuice-standalone.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
